<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Cream paper disc with thin gold ring -->
  <defs>
    <radialGradient id="paper" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#FBF6E9"/>
      <stop offset="100%" stop-color="#F1E9D4"/>
    </radialGradient>
  </defs>
  <circle cx="512" cy="512" r="500" fill="url(#paper)"/>
  <circle cx="512" cy="512" r="478" fill="none" stroke="#B68838" stroke-width="3"/>

  <!-- Centerpiece: crown + crossed rackets, antique gold strokes -->
  <g transform="translate(512 380)" stroke="#A6864D" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Crown -->
    <g stroke-width="6">
      <path d="M-90 30 L-65 -45 L-30 25 L0 -75 L30 25 L65 -45 L90 30 Z"/>
      <circle cx="-65" cy="-55" r="6" fill="#A6864D"/>
      <circle cx="0"   cy="-85" r="6" fill="#A6864D"/>
      <circle cx="65"  cy="-55" r="6" fill="#A6864D"/>
    </g>
    <!-- Left racket -->
    <g stroke-width="7" transform="rotate(-22 0 130)">
      <ellipse cx="-30" cy="120" rx="80" ry="100"/>
      <line x1="20" y1="200" x2="80" y2="320"/>
    </g>
    <!-- Right racket -->
    <g stroke-width="7" transform="rotate(22 0 130)">
      <ellipse cx="30" cy="120" rx="80" ry="100"/>
      <line x1="-20" y1="200" x2="-80" y2="320"/>
    </g>
    <!-- Left racket strings -->
    <g stroke-width="2" opacity="0.55">
      <line x1="-110" y1="80"  x2="20"  y2="105"/>
      <line x1="-115" y1="120" x2="15"  y2="145"/>
      <line x1="-110" y1="160" x2="20"  y2="185"/>
      <line x1="-85"  y1="40"  x2="-50" y2="200"/>
      <line x1="-50"  y1="30"  x2="-15" y2="190"/>
    </g>
    <!-- Right racket strings -->
    <g stroke-width="2" opacity="0.55">
      <line x1="110" y1="80"  x2="-20" y2="105"/>
      <line x1="115" y1="120" x2="-15" y2="145"/>
      <line x1="110" y1="160" x2="-20" y2="185"/>
      <line x1="85"  y1="40"  x2="50"  y2="200"/>
      <line x1="50"  y1="30"  x2="15"  y2="190"/>
    </g>
  </g>

  <!-- Wordmark: PADEL (Playfair-ish bold) + CLUB (light tracking) -->
  <g text-anchor="middle" font-family="'Playfair Display', 'Cormorant Garamond', Georgia, serif">
    <text x="512" y="800"
          font-size="78" font-weight="700" letter-spacing="14"
          fill="#1F2D24">PADEL</text>
    <text x="512" y="868"
          font-size="40" font-weight="500" letter-spacing="24"
          fill="#A6864D">CLUB</text>
  </g>
</svg>
